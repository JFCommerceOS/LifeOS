# Install, migrate, generate, build, test — matches Phase 0 acceptance gate (automated).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lifeos

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifeos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lifeos"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Write .env for Prisma scripts
        run: echo "DATABASE_URL=${DATABASE_URL}" > .env

      - name: Prisma migrate deploy
        run: pnpm --filter @life-os/database exec dotenv -e ../../.env -- prisma migrate deploy

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test
